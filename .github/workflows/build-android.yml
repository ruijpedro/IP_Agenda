name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm install -g npm@10.9.2
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps --no-audit --no-fund --no-package-lock

      - name: Build WebApp
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Prepare Android Platform
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Apply IP_RJP Android icons
        run: |
          set -e
          SRC="public/icons/android"
          DST="android/app/src/main/res"
          for D in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi mipmap-anydpi-v26; do
            mkdir -p "$DST/$D"
            cp -f "$SRC/$D"/* "$DST/$D/"
          done
          echo "Ícones copiados para Android:"
          find "$DST" -name 'ic_launcher*' -o -name 'ic_launcher_adaptive*' | sort

      - name: Ensure Android Manifest icon
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('android/app/src/main/AndroidManifest.xml')
          s = p.read_text()
          s = s.replace('android:label="@string/app_name"', 'android:label="IP_RJP"')
          s = s.replace('android:label="IP_RJP"', 'android:label="IP_RJP"')
          # add icon attributes to the <application ...> tag if missing
          if 'android:icon=' not in s:
              s = s.replace('<application', '<application android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher_round"', 1)
          else:
              import re
              s = re.sub(r'android:icon="[^"]*"', 'android:icon="@mipmap/ic_launcher"', s)
              if 'android:roundIcon=' in s:
                  s = re.sub(r'android:roundIcon="[^"]*"', 'android:roundIcon="@mipmap/ic_launcher_round"', s)
              else:
                  s = s.replace('<application', '<application android:roundIcon="@mipmap/ic_launcher_round"', 1)
          p.write_text(s)
          PY

      - name: Build Debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IP_RJP_Outlook_Debug_APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
